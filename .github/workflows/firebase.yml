# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions
# https://www.youtube.com/watch?v=kLEp5tGDqcI
# https://docs.github.com/en/actions/learn-github-actions/environment-variables

name: Firebase CI

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  deploy:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    strategy:
      matrix:
        node-version: [20.15.0]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    - name: Init and update jsdoc submodules to latest
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "github.action@gmail.com"
        git submodule update --init --remote
    - name: Commit submodule updates if changed
      run: |
        git add content/jsdoc/pixi-vn content/jsdoc/pixi-vn-json content/jsdoc/pixi-vn-ink
        if ! git diff --staged --quiet; then
          git commit -m "chore: update jsdoc submodules to latest"
          git push origin main
        fi
    - name: Add crowdin files
      # Merge l10n_main branch into main branch
      run: |
        git checkout main
        git fetch origin l10n_main
        git merge origin/l10n_main --no-edit --allow-unrelated-histories -X ours
    - name: Apply markdown frontmatter to jsdoc content
      # Adds YAML frontmatter (title) to each .md file in content/jsdoc.
      # These changes are intentionally NOT committed — they are only needed for the build.
      run: |
        find content/jsdoc -type f -name "*.md" | while IFS= read -r file; do
          title=$(grep -m 1 '^# ' "$file" | sed 's/^# //')
          if [ -z "$title" ]; then
            title=$(basename "$file" .md)
          fi
          title=$(echo "$title" | sed 's/"/\\"/g')
          {
            echo "---"
            echo "title: \"${title}\""
            echo "---"
            echo
            sed '0,/^# /d' "$file"
          } > "$file.tmp"
          mv "$file.tmp" "$file"
        done
    - name: npm install and build
      run: |
        npm install
        node scripts/fetch-schemas.js
        NODE_OPTIONS=--max-old-space-size=6096 npm run build && npm run export
    - name: Archive Build
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: out
    # https://github.com/FirebaseExtended/action-hosting-deploy
    - name: Deploy
      uses: FirebaseExtended/action-hosting-deploy@v0.10.0
      with:
        repoToken: ${{ secrets.GITHUB_TOKEN }}
        firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PIXI_VN }}
        projectId: pixi-vn
        channelId: live # prod
