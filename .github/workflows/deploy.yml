name: Deploy CI

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: deploy-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    strategy:
      matrix:
        node-version: [20.19.0]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    - name: Init and update jsdoc submodules to latest
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "github.action@gmail.com"
        git submodule update --init --remote
        git submodule foreach '
          branch=$(git config -f "$toplevel/.gitmodules" --get "submodule.$name.branch" || echo main)
          git fetch origin "$branch"
          git checkout -B "$branch" "origin/$branch"
          git pull --ff-only origin "$branch"
        '
    - name: Commit submodule updates if changed
      run: |
          git add content/jsdoc/pixi-vn content/jsdoc/pixi-vn-json content/jsdoc/pixi-vn-ink
          if ! git diff --staged --quiet; then
            git commit -m "chore: update jsdoc submodules to latest [skip ci]"
            git pull --rebase origin main
            attempt=0
            while ! git push origin HEAD:main; do
              attempt=$((attempt + 1))
              if [ "$attempt" -ge 3 ]; then
                exit 1
              fi
              git pull --rebase origin main
            done
          fi
    - name: Add crowdin files
      # Merge l10n_main branch into main branch
      run: |
        git checkout main
        git fetch origin l10n_main
        git merge origin/l10n_main --no-edit --allow-unrelated-histories -X ours
    - name: Prepare jsdoc MDX content
      # Converts jsdoc wiki pages to .mdx and adds YAML frontmatter for the build.
      # These changes are intentionally NOT committed — they are only needed for the build.
      run: python3 scripts/prepare-jsdoc-content.py
    - name: Fix jsdoc internal links for fumadocs
      # Converts relative .md/.mdx links to absolute fumadocs paths.
      # TypeDoc generates relative links that resolve incorrectly in fumadocs
      # because index.mdx pages are served without a trailing slash.
      # These changes are intentionally NOT committed — they are only needed for the build.
      run: python3 scripts/fix-jsdoc-links.py
    - name: Sync redirects to firebase.json and vercel.json
      run: node scripts/sync-redirects.js
    - name: npm install and build
      run: |
        npm install
        node scripts/fetch-schemas.js
        NODE_OPTIONS=--max-old-space-size=6096 npm run build && npm run export
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: out

  deploy-firebase:

    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      deployed: ${{ steps.result.outputs.deployed }}

    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: out
    - name: Sync redirects to firebase.json
      run: node scripts/sync-redirects.js
    # https://github.com/FirebaseExtended/action-hosting-deploy
    - name: Deploy to Firebase
      id: deploy
      uses: FirebaseExtended/action-hosting-deploy@v0.10.0
      with:
        repoToken: ${{ secrets.GITHUB_TOKEN }}
        firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PIXI_VN }}
        projectId: pixi-vn
        channelId: live # prod
    - name: Set deploy result
      id: result
      if: always()
      run: echo "deployed=${{ steps.deploy.conclusion == 'success' }}" >> $GITHUB_OUTPUT

  deploy-vercel:

    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      deployed: ${{ steps.result.outputs.deployed }}

    steps:
    - uses: actions/checkout@v4
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: out
    - name: Sync redirects to vercel.json
      run: node scripts/sync-redirects.js
    - name: Copy Vercel config to build output
      run: cp vercel.json out/vercel.json
    # https://github.com/amondnet/vercel-action
    - name: Deploy to Vercel
      id: deploy
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: team_0GgWhwEZo6OVtYhxZta1dzGo
        vercel-project-id: prj_Wkwlmd2qOtn3rnxLInHxAQr0i26D
        vercel-args: '--prod --archive=tgz'
        vercel-version: 'latest'
        working-directory: ./out
    - name: Set deploy result
      id: result
      if: always()
      run: echo "deployed=${{ steps.deploy.conclusion == 'success' }}" >> $GITHUB_OUTPUT

  deploy-netlify:

    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      deployed: ${{ steps.result.outputs.deployed }}

    steps:
    - uses: actions/checkout@v4
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: out
    - name: Sync redirects to netlify.toml
      run: node scripts/sync-redirects.js
    - name: Install Netlify CLI
      run: npm install -g netlify-cli
    - name: Deploy to Netlify
      id: deploy
      run: netlify deploy --dir=./out --prod --auth=${{ secrets.NETLIFY_AUTH_TOKEN }} --site=4ea09312-196a-4140-8b51-65c3e6315629
    - name: Set deploy result
      id: result
      if: always()
      run: echo "deployed=${{ steps.deploy.conclusion == 'success' }}" >> $GITHUB_OUTPUT

  deploy-cloudflare:

    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      deployed: ${{ steps.result.outputs.deployed }}

    steps:
    - uses: actions/checkout@v4
    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: out
    - name: Generate _redirects for Cloudflare Pages
      run: |
        node scripts/sync-redirects.js
        cp _redirects out/_redirects
    # https://github.com/cloudflare/pages-action
    - name: Deploy to Cloudflare Pages
      id: deploy
      uses: cloudflare/pages-action@v1
      with:
        apiToken: ${{ secrets.CF_API_TOKEN }}
        accountId: ${{ secrets.CF_ACCOUNT_ID }}
        projectName: pixi-vn
        directory: out
        gitHubToken: ${{ secrets.GITHUB_TOKEN }}
    - name: Set deploy result
      id: result
      if: always()
      run: echo "deployed=${{ steps.deploy.conclusion == 'success' }}" >> $GITHUB_OUTPUT

  update-cloudflare-dns:

    needs: [deploy-firebase, deploy-vercel, deploy-netlify, deploy-cloudflare]
    if: always()
    runs-on: ubuntu-latest

    steps:
    - name: Check deployments and update Cloudflare DNS
      env:
        CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        FIREBASE_DEPLOYED: ${{ needs.deploy-firebase.outputs.deployed }}
        VERCEL_DEPLOYED: ${{ needs.deploy-vercel.outputs.deployed }}
        NETLIFY_DEPLOYED: ${{ needs.deploy-netlify.outputs.deployed }}
        CLOUDFLARE_DEPLOYED: ${{ needs.deploy-cloudflare.outputs.deployed }}
      run: |
        SOURCES=(
          "https://pixi-vn.pages.dev"
          "https://pixi-vn.web.app"
          "https://pixi-vn.vercel.app"
          "https://pixi-vn.netlify.app"
        )
        CNAMES=(
          "pixi-vn.pages.dev"
          "pixi-vn.web.app"
          "pixi-vn.vercel.app"
          "pixi-vn.netlify.app"
        )

        TARGET_CNAME=""
        for i in "${!SOURCES[@]}"; do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${SOURCES[$i]}")
          echo "${SOURCES[$i]} → $STATUS"
          if [ "$STATUS" = "200" ]; then
            TARGET_CNAME="${CNAMES[$i]}"
            break
          fi
        done

        if [ -n "$TARGET_CNAME" ]; then
          echo "Target: pixi-vn.com → $TARGET_CNAME"

          ZONE_ID=$(curl -sf "https://api.cloudflare.com/client/v4/zones?name=pixi-vn.com" \
            -H "Authorization: Bearer $CF_API_TOKEN" | jq -r '.result[0].id')

          RECORD_ID=$(curl -sf "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records?type=CNAME&name=pixi-vn.com" \
            -H "Authorization: Bearer $CF_API_TOKEN" | jq -r '.result[0].id')

          PAYLOAD=$(jq -n --arg c "$TARGET_CNAME" \
            '{"type":"CNAME","name":"pixi-vn.com","content":$c,"ttl":1,"proxied":true}')

          if [ "$RECORD_ID" = "null" ] || [ -z "$RECORD_ID" ]; then
            curl -sf -X POST "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD"
            echo "DNS record created"
          else
            curl -sf -X PUT "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/dns_records/$RECORD_ID" \
              -H "Authorization: Bearer $CF_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD"
            echo "DNS record updated"
          fi
        else
          echo "No reachable deployment found, DNS not updated"
        fi

        if [ "$FIREBASE_DEPLOYED" != "true" ] && [ "$VERCEL_DEPLOYED" != "true" ] && [ "$NETLIFY_DEPLOYED" != "true" ] && [ "$CLOUDFLARE_DEPLOYED" != "true" ]; then
          echo "All deployments failed"
          exit 1
        fi
